<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White halo — wider than the colored ring, drawn first, bleeds out on both sides -->
  <!-- White inner fill for the wedge gaps -->
  <circle cx="50" cy="50" r="39" fill="white"/>
  <!-- Colored ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#f8654b" stroke-width="10"/>
  <!-- Colored diagonal -->
  <line x1="21" y1="21" x2="79" y2="79" stroke="#f8654b" stroke-width="10" stroke-linecap="round"/>
</svg>
